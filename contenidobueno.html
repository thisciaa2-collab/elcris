<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visión | Agencia de Creadores</title>
    <style>
        /* Estilos base y variables corporativas */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Barra de navegación estilo empresa */
        nav {
            background-color: var(--bg-card);
            padding: 20px 5%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-dark);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        /* Sección Principal (Hero) */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
        }

        .hero-container {
            max-width: 800px;
            animation: fadeIn 1s ease-out forwards;
        }

        .tagline {
            display: inline-block;
            background-color: #dbeafe;
            color: #1e40af;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .mission-statement {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-dark);
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .mission-statement span {
            color: var(--primary);
        }

        .mission-sub {
            font-size: 1.25rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Botones estilo corporativo */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: 1px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid #cbd5e1;
        }

        .btn-outline:hover {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .mission-statement { font-size: 2rem; }
            .btn-group { flex-direction: column; width: 100%; max-width: 300px; margin: 0 auto;}
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">Creator<span>Studio.</span></a>
    </nav>

    <main>
        <div class="hero-container">
            <div class="tagline">Nuestra Filosofía</div>
            <h1 class="mission-statement">
                No te rindas, crear contenido <span>no es tan fácil</span>, hacerse popular tampoco.
            </h1>
            <p class="mission-sub">
                Pero si confías en ti mismo, puedes llegar a hacerlo. Descubre cómo potenciar tu alcance con la estrategia correcta.
            </p>
            
            <div class="btn-group">
                <a href="contenidobueno.html" class="btn btn-primary">¿Cómo puedo hacer buen contenido?</a>
                <a href="#" class="btn btn-outline">Descubre nuestro trabajo</a>
            </div>
        </div>
    </main>

</body>
</html>
