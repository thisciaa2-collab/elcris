<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto | Creador de Contenido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .card {
            max-width: 700px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            animation: fadeIn 1.5s ease-in-out;
        }

        .quote {
            font-size: 1.8rem;
            font-weight: 500;
            line-height: 1.5;
            color: #e2e8f0;
            margin-bottom: 40px;
        }

        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(45deg, #0ea5e9, #2563eb);
            border: none;
            border-radius: 30px;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #8b5cf6, #6d28d9);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.4);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <p class="quote">
            "No te rindas, crear contenido <span class="highlight">no es tan fácil</span>, hacerse popular tampoco.<br><br> 
            Pero si confías en ti mismo, <span class="highlight">puedes llegar a hacerlo</span>."
        </p>
        
        <div class="btn-container">
            <!-- Botón original -->
            <a href="#" class="btn">Descubre mi trabajo</a>
            <!-- Nuevo botón que lleva a contenidobueno.html -->
            <a href="contenidobueno.html" class="btn btn-secondary">¿Cómo puedo hacer buen contenido?</a>
        </div>
    </div>

</body>
